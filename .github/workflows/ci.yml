name: CI/CD for tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-laster

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Run tests
      run: python test.py